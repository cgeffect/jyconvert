name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: build-mac.sh
            artifact_glob: |
              dist/*.dmg
              dist/*-mac.zip
          - os: windows-latest
            build_script: build-win.sh
            artifact_glob: |
              dist/jyconvert-*-win-x64.exe
              dist/jyconvert-*-win-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build app
        shell: bash
        env:
          # 未配置 Apple 开发者证书时，跳过签名避免 CI 失败
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          chmod +x "${{ matrix.build_script }}" scripts/*.sh
          "./${{ matrix.build_script }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ASSET_IDS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].id' 2>/dev/null || true)
          for id in $ASSET_IDS; do
            [ -n "$id" ] && gh api --method DELETE "/repos/${{ github.repository }}/releases/assets/${id}"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
